apiVersion: v1
kind: Namespace
metadata:
  name: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: api
spec:
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:5.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "root"
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: "root"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  namespace: api
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-api
  namespace: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express-api
  template:
    metadata:
      labels:
        app: express-api
    spec:
      containers:
      - name: express-api
        image: cicd-app-example:latest 
        imagePullPolicy: Always 
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URI
          value: "mongodb://root:root@mongodb-svc:27017/blog?authSource=admin"
---
apiVersion: v1
kind: Service
metadata:
  name: express-api-svc
  namespace: api
spec:
  selector:
    app: express-api
  ports:
  - port: 80
    targetPort: 3000