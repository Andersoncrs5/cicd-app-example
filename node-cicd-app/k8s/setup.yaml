apiVersion: v1
kind: Pod
metadata:
  name: jenkins-agent
spec:
  containers:
  - name: node
    image: node:20-alpine
    command: ["/bin/sh", "-c", "cat"]
    tty: true
  - name: kaniko
    image: gcr.io/kaniko-project/executor:debug
    command: ["/busybox/cat"]
    tty: true
    volumeMounts:
      - name: kaniko-secret
        mountPath: /kaniko/.docker 
  volumes:
    - name: kaniko-secret
      secret:
        secretName: docker-hub-creds 
        items:
          - key: .dockerconfigjson
            path: config.json